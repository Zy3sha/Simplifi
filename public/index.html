<!DOCTYPE html>
<html lang="en" style="background:#F0DDD6">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

  <!-- SEO Essentials -->
  <title>OBubba, Smart Baby Tracker | Feed, Sleep, Nap & Milestone Tracking</title>
  <meta name="description" content="Track your baby's feeds, sleep, naps, growth and milestones with smart predictions. OBubba learns your baby's unique rhythm using NHS and WHO guidance. Free for iPhone and Android."/>
  <meta name="keywords" content="baby tracker, baby app, feeding tracker, sleep tracker, nap timer, breastfeed timer, milestone tracker, growth chart, NHS baby, newborn tracker, baby schedule, baby routine, nap prediction, bedtime prediction"/>
  <link rel="canonical" href="https://obubba.com/"/>

  <!-- Open Graph (Facebook, WhatsApp, iMessage link previews) -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://obubba.com/"/>
  <meta property="og:title" content="OBubba, Smart Baby Tracker"/>
  <meta property="og:description" content="Track feeds, sleep, naps, milestones & growth with personalised predictions powered by NHS guidance + your baby's unique rhythm."/>
  <meta property="og:image" content="https://obubba.com/og-image.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:site_name" content="OBubba"/>
  <meta property="og:locale" content="en_GB"/>

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="OBubba, Smart Baby Tracker"/>
  <meta name="twitter:description" content="The baby app that learns your baby's rhythm. Track feeds, sleep, naps, milestones & growth with personalised predictions."/>
  <meta name="twitter:image" content="https://obubba.com/og-image.png"/>

  <!-- PWA / Mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="OBubba"/>
  <meta name="application-name" content="OBubba"/>
  <meta name="theme-color" content="#f0ddd6"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "OBubba, Smart Baby Tracker",
    "description": "Smart baby tracker that learns your baby's unique rhythm.",
    "applicationCategory": "HealthApplication",
    "operatingSystem": "iOS, Android, Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "GBP" },
    "author": { "@type": "Organization", "name": "OBubba", "url": "https://obubba.com" },
    "url": "https://obubba.com",
    "image": "https://obubba.com/obubba-happy.png"
  }
  </script>

  <!-- Fonts — local Parisienne for splash, then Google Fonts for the rest -->
  <style>@font-face{font-family:'Parisienne';src:url('Parisienne-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:block}</style>
  <link rel="preload" href="Parisienne-Regular.ttf" as="font" type="font/truetype"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>

  <!-- External libraries (React loaded from CDN for PWA; Babel removed, app.js is pre-compiled) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase -->
  <script type="module" src="/firebase.js"></script>

  <!-- Native Plugin Bridge -->
  <script src="/native-plugins.js" defer></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css?v=1777141025"/>
</head>
<body style="background:#F0DDD6;margin:0">
<div id="ob-splash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F0DDD6">
  <style>
    #ob-splash .baby{animation:babyBreathe 3.5s ease-in-out infinite}
    @keyframes babyBreathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.008)}}
  </style>
  <img class="baby" src="obubba-loading.png" alt="" width="140" height="210" style="object-fit:contain;margin-bottom:14px">
  <div style="font-family:'Parisienne',cursive;font-size:28px;color:#5B4F5F;margin-bottom:8px">OBubba</div>
  <div style="font-size:13px;color:#A89898">Getting everything ready...</div>
</div>
<div id="root"></div>
<button id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">🌙</button>

<!-- Theme system -->
<script src="/theme.js"></script>

<!-- App (pre-compiled by Babel; see build-pwa.sh) -->
<script defer src="/app.js?v=1777141025"></script>

<!-- Hide splash + failsafe -->
<script>
  function _hideNativeSplash(){
    if(window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen){
      window.Capacitor.Plugins.SplashScreen.hide({fadeOutDuration:300});
    }
  }
  function _hideSplash(){var s=document.getElementById('ob-splash');if(s){s.style.opacity='0';s.style.transition='opacity 0.3s';setTimeout(function(){s.style.display='none';},300);}}
  window.addEventListener('DOMContentLoaded', function(){_hideNativeSplash();});
  window.addEventListener('load', function(){setTimeout(_hideSplash, 200);});
  setTimeout(function(){_hideNativeSplash();_hideSplash();}, 3000);
</script>

<!-- App loader -->
<script src="/loader.js"></script>
</body>
</html>
