<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Bubba Care</title>
<meta name="theme-color" content="#FFFCF9"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #FFFCF9; font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; color: #4A3B35; min-height: 100vh; }
  body { padding: max(20px, env(safe-area-inset-top, 20px)) 16px max(20px, env(safe-area-inset-bottom, 20px)); max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 18px; }
  .logo { font-family: "Playfair Display", Georgia, serif; font-weight: 700; font-size: 26px; letter-spacing: 0.08em; color: #4A3B35; }
  .sub { font-size: 13px; color: #7A5C52; margin-top: 2px; }
  .card { background: #FFFDFA; border: 1.5px solid #E8DED3; border-radius: 20px; padding: 16px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(74,59,53,0.04); }
  .caring-banner { background: rgba(155,184,168,0.1); border: 1px solid rgba(155,184,168,0.4); border-radius: 14px; padding: 12px 16px; margin-bottom: 16px; text-align: center; }
  .caring-banner .title { font-size: 16px; font-weight: 700; color: #4A3B35; margin-bottom: 2px; }
  .caring-banner .text { font-size: 13px; color: #6A8A7A; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .action-btn { padding: 22px 12px; border-radius: 20px; border: 2px solid #E8DED3; background: #FFFDFA; cursor: pointer; font-size: 18px; font-weight: 700; color: #4A3B35; display: flex; flex-direction: column; align-items: center; gap: 6px; min-height: 110px; font-family: inherit; transition: transform 0.1s, background 0.15s, border-color 0.15s; }
  .action-btn:active { transform: scale(0.97); background: #F8F1EA; }
  .action-btn .icon { font-size: 36px; }
  .action-btn.active { background: rgba(155,184,168,0.15); border-color: #9BB8A8; }
  .section-label { font-size: 11px; font-weight: 700; color: #7A5C52; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .entry { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; background: #FBF5F0; border: 1px solid #E8DED3; margin-bottom: 6px; font-size: 14px; }
  .entry .emoji { font-size: 18px; }
  .entry .label { flex: 1; font-weight: 600; color: #4A3B35; }
  .entry .time { font-size: 12px; color: #7A5C52; font-family: ui-monospace, monospace; }
  .sheet { position: fixed; inset: 0; background: rgba(44,31,26,0.5); z-index: 100; display: flex; align-items: flex-end; }
  .sheet-inner { background: #FFFCF9; border-radius: 28px 28px 0 0; padding: 24px 20px max(24px, env(safe-area-inset-bottom,24px)); width: 100%; max-width: 560px; margin: 0 auto; }
  .sheet-handle { width: 40px; height: 4px; background: #E8DED3; border-radius: 99px; margin: 0 auto 18px; }
  .sheet-title { font-family: "Playfair Display", Georgia, serif; font-size: 22px; font-weight: 700; color: #4A3B35; text-align: center; margin-bottom: 14px; }
  .amount-display { font-size: 54px; font-weight: 700; color: #C07088; text-align: center; font-family: ui-monospace, monospace; margin-bottom: 10px; }
  .amount-display .unit { font-size: 20px; color: #A89A90; font-weight: 600; margin-left: 4px; }
  .amount-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .amt-btn { padding: 14px; border-radius: 14px; border: 2px solid #E8DED3; background: #FFFDFA; font-size: 18px; font-weight: 700; color: #4A3B35; cursor: pointer; font-family: inherit; }
  .amt-btn.plus { border-color: #C07088; color: #C07088; background: rgba(192,112,136,0.06); }
  .amt-btn:active { transform: scale(0.96); }
  .opt-btn { width: 100%; padding: 18px; border-radius: 14px; border: 2px solid #E8DED3; background: #FFFDFA; font-size: 18px; font-weight: 700; color: #4A3B35; cursor: pointer; font-family: inherit; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .opt-btn .emoji { font-size: 24px; }
  .save-btn { width: 100%; padding: 18px; border-radius: 99px; border: none; background: linear-gradient(135deg,#C07088,#a85a44); color: white; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 14px rgba(192,112,136,0.25); }
  .cancel-btn { width: 100%; padding: 12px; border-radius: 99px; border: none; background: transparent; color: #A89A90; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #4A3B35; color: #FAF6F0; padding: 12px 18px; border-radius: 99px; font-size: 14px; font-weight: 600; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.2s; }
  .toast.show { opacity: 1; }
  .error-screen { padding: 40px 24px; text-align: center; }
  .error-screen .icon { font-size: 48px; margin-bottom: 16px; }
  .error-screen h2 { font-family: "Playfair Display", serif; font-size: 22px; color: #4A3B35; margin-bottom: 8px; }
  .error-screen p { font-size: 14px; color: #7A5C52; line-height: 1.6; }
  .loading { padding: 60px 20px; text-align: center; color: #7A5C52; }
  .parent-note { background: rgba(212,168,133,0.08); border: 1px solid rgba(212,168,133,0.3); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; font-size: 14px; color: #4A3B35; line-height: 1.55; }
  .parent-note .pn-label { font-size: 10px; font-weight: 700; color: #A88848; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .call-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 13px 16px; border-radius: 14px; border: 1.5px solid #9BB8A8; background: rgba(155,184,168,0.08); color: #4A3B35; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; margin-bottom: 6px; }
  .call-btn .emoji { font-size: 20px; }
  .call-btn .name { flex: 1; text-align: left; }
  .call-btn .arrow { color: #9BB8A8; font-size: 18px; }
  .reassurance-item { padding: 12px 14px; border-radius: 12px; background: #FBF5F0; border: 1px solid #E8DED3; margin-bottom: 8px; }
  .reassurance-item .q { font-size: 14px; font-weight: 700; color: #4A3B35; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .reassurance-item .a { font-size: 13px; color: #6A584E; line-height: 1.55; }
  details.reassurance-item summary { list-style: none; cursor: pointer; -webkit-user-select: none; user-select: none; }
  details.reassurance-item summary::-webkit-details-marker { display: none; }
  details.reassurance-item[open] summary { margin-bottom: 6px; }
  details.reassurance-item summary::after { content: "▼"; margin-left: auto; font-size: 10px; color: #A89A90; transition: transform 0.2s; }
  details.reassurance-item[open] summary::after { transform: rotate(180deg); }
  details.reassurance-item summary .q { display: flex; align-items: center; gap: 6px; width: 100%; margin-bottom: 0; }
  details.reassurance-item summary .q::after { content: "▼"; margin-left: auto; font-size: 10px; color: #A89A90; transition: transform 0.2s; }
  details.reassurance-item[open] summary .q::after { transform: rotate(180deg); }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdHzmheQRbtzP_JI1FuWcZLeW8yVja5-0",
  authDomain: "obubba-d9ccc.firebaseapp.com",
  projectId: "obubba-d9ccc",
  storageBucket: "obubba-d9ccc.firebasestorage.app",
  messagingSenderId: "1091432133381",
  appId: "1:1091432133381:web:1cd4d0ce7397affeae7d6c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Parse URL params
const params = new URLSearchParams(window.location.search);
const code = (params.get("code") || "").toUpperCase().trim();
const childId = (params.get("child") || "").trim();

const $app = document.getElementById("app");

if (!code || code.length < 4) {
  $app.innerHTML = `
    <div class="error-screen">
      <div class="icon">🔑</div>
      <h2>Invalid care link</h2>
      <p>This link is missing the access code. Please ask the parent to share a fresh link via the OBubba app.</p>
    </div>`;
} else {
  // Sign in anonymously, load context, then render
  signInAnonymously(auth).then(async () => {
    await loadFamilyContext();
    renderApp();
  }).catch((err) => {
    console.error("Auth failed", err);
    $app.innerHTML = `
      <div class="error-screen">
        <div class="icon">📡</div>
        <h2>Can't connect</h2>
        <p>We couldn't reach OBubba's servers. Please check your internet and try again.</p>
      </div>`;
  });
}

function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function fmt12(t) {
  const [h,m] = (t||"").split(":").map(Number);
  if(isNaN(h)) return t;
  const ap = h >= 12 ? "pm" : "am";
  const h12 = (h % 12) || 12;
  return h12 + ":" + String(m).padStart(2,"0") + ap;
}
function agoMin(t) {
  if(!t) return null;
  const [h,m] = t.split(":").map(Number);
  const now = new Date();
  let d = (now.getHours()*60 + now.getMinutes()) - (h*60+m);
  if(d < 0) d += 1440;
  return d;
}
function fmtAgo(mins) {
  if(mins === null) return "—";
  if(mins < 1) return "just now";
  if(mins < 60) return mins + "m ago";
  const h = Math.floor(mins/60), m = mins%60;
  return h + "h " + (m>0 ? m + "m " : "") + "ago";
}

let sheet = null;
let recentEntries = [];
let familyContext = { babyName: "baby", babyDob: null, ageWeeks: null, babyPhoto: null, today: {}, pinnedNotes: [], carerNotes: "", carerComfort: "", emergencyContacts: [] };
let _childrenCache = null; // used to recompute stats when carer entries arrive

function todayStrLocal() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function getWakeWindow(weeks) {
  // Age-based wake window (NHS/AASM guidance)
  if (weeks < 4) return { min:45, max:60, label:"45–60 min" };
  if (weeks < 8) return { min:60, max:90, label:"1–1.5h" };
  if (weeks < 13) return { min:60, max:105, label:"1–1h 45m" };
  if (weeks < 17) return { min:90, max:120, label:"1.5–2h" };
  if (weeks < 26) return { min:120, max:150, label:"2–2.5h" };
  if (weeks < 39) return { min:150, max:180, label:"2.5–3h" };
  if (weeks < 52) return { min:180, max:210, label:"3–3.5h" };
  return { min:210, max:240, label:"3.5–4h" };
}

function computeTodayStats(children, childId, extraEntries) {
  // Pick first child by default; use childId if provided
  const ch = childId ? (children.find(c=>c.id===childId) || children[0]) : children[0];
  if (!ch) return null;
  const today = todayStrLocal();
  const baseEntries = (ch.days && ch.days[today]) || [];
  // Merge in any extra entries (pending carer_logs entries from Firestore) that haven't been
  // accepted by the parent yet, so the carer portal reflects real-time state.
  const entries = Array.isArray(extraEntries) ? baseEntries.concat(extraEntries) : baseEntries;
  const feeds = entries.filter(e => e.type === "feed" && !e.night);
  const naps = entries.filter(e => e.type === "nap" && !e.night);
  const poops = entries.filter(e => e.type === "poop");
  const lastFeed = feeds.length ? feeds[feeds.length-1] : null;
  const lastNap = naps.length ? naps[naps.length-1] : null;
  const lastPoop = poops.length ? poops[poops.length-1] : null;
  const wetCount = poops.filter(p => { const _pt=(p.poopType||"wet").toLowerCase(); return _pt.includes("wet")||_pt==="both"; }).length;
  const dirtyCount = poops.filter(p => (p.poopType||"").includes("dirty")||(p.poopType||"").includes("mixed")||(p.poopType||"").includes("yellow")||(p.poopType||"").includes("green")||(p.poopType||"").includes("brown")).length;
  const totalMl = feeds.reduce((s,f)=>s+(f.amount||0),0);
  // Avg per feed (from today + recent)
  const recentFeeds = Object.values(ch.days||{}).flat().filter(e=>e&&e.type==="feed"&&!e.night&&e.amount>0).slice(-20);
  const avgMl = recentFeeds.length ? Math.round(recentFeeds.reduce((s,f)=>s+f.amount,0)/recentFeeds.length) : 0;
  const avgFeedsPerDay = (()=>{const days=ch.days||{};const counts=Object.values(days).slice(-7).map(d=>(d||[]).filter(e=>e.type==="feed").length).filter(n=>n>0);return counts.length?Math.round(counts.reduce((a,b)=>a+b,0)/counts.length):0;})();
  return { today, entries, lastFeed, lastNap, lastPoop, wetCount, dirtyCount, nappyCount: poops.length, totalMl, avgMl, avgFeedsPerDay, naps };
}

async function loadFamilyContext() {
  try {
    const famDoc = await getDoc(doc(db, "families", code));
    if (famDoc.exists()) {
      const data = famDoc.data();
      // Extract baby name + DOB
      try {
        const children = JSON.parse(data.children || "[]");
        const arr = Array.isArray(children) ? children : Object.values(children);
        if (arr.length > 0) {
          const ch = arr[0];
          familyContext.babyName = ch.name || "baby";
          familyContext.babyDob = ch.dob || null;
          if (ch.dob) {
            const dobDate = new Date(ch.dob + "T00:00:00");
            const weeks = Math.floor((Date.now() - dobDate.getTime()) / (7*24*3600*1000));
            familyContext.ageWeeks = weeks;
          }
          _childrenCache = arr;
          // Use URL childId if present; otherwise pick the baby matching the stored profile
          familyContext.today = computeTodayStats(arr, childId) || {};
          // Also update name/age from the resolved child (in case URL specified a specific one)
          const _resolvedCh = childId ? (arr.find(c=>c.id===childId) || arr[0]) : arr[0];
          if (_resolvedCh) {
            familyContext.babyName = _resolvedCh.name || "baby";
            familyContext.babyDob = _resolvedCh.dob || null;
            familyContext.babyPhoto = _resolvedCh.photo || null;
            if (_resolvedCh.dob) {
              const _dobDate = new Date(_resolvedCh.dob + "T00:00:00");
              familyContext.ageWeeks = Math.floor((Date.now() - _dobDate.getTime()) / (7*24*3600*1000));
            }
          }
        }
      } catch (e) { console.warn("Children parse", e); }
      // Parse shared data for pinned notes
      try {
        const sd = JSON.parse(data.sharedData || "{}");
        familyContext.pinnedNotes = Array.isArray(sd.pinnedNotes) ? sd.pinnedNotes.filter(n=>n&&n.pinned) : [];
      } catch {}
      // Parse carer info
      try {
        const ci = JSON.parse(data.carerInfo || "{}");
        familyContext.carerNotes = ci.carerNotes || "";
        familyContext.carerComfort = ci.carerComfort || "";
        familyContext.emergencyContacts = Array.isArray(ci.emergencyContacts) ? ci.emergencyContacts : [];
      } catch {}
    }
  } catch (e) { console.warn("Family context load failed", e); }
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add("show"), 10);
  setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 2200);
}

async function logEntry(entry) {
  try {
    const colRef = collection(db, "carer_logs", code, "entries");
    await addDoc(colRef, {
      ...entry,
      time: entry.time || nowTime(),
      loggedAt: new Date().toISOString(),
      loggedBy: "carer"
    });
    showToast("✓ Saved · parents will see this");
    closeSheet();
  } catch (e) {
    console.error("Log failed", e);
    showToast("Couldn't save — try again");
  }
}

function closeSheet() {
  if(sheet) { sheet.remove(); sheet = null; }
}

function openSheet(type) {
  closeSheet();
  sheet = document.createElement("div");
  sheet.className = "sheet";
  sheet.onclick = (e) => { if(e.target === sheet) closeSheet(); };
  let inner = "";

  if (type === "feed") {
    let ml = 120;
    inner = `
      <div class="sheet-inner">
        <div class="sheet-handle"></div>
        <div class="sheet-title">🍼 Log a Feed</div>
        <div class="amount-display"><span id="ml-val">${ml}</span><span class="unit">ml</span></div>
        <div class="amount-btns">
          <button class="amt-btn" data-delta="-30">−30</button>
          <button class="amt-btn" data-delta="-10">−10</button>
          <button class="amt-btn" data-set="0">Clear</button>
          <button class="amt-btn plus" data-delta="10">+10</button>
          <button class="amt-btn plus" data-delta="30">+30</button>
          <button class="amt-btn plus" data-delta="60">+60</button>
        </div>
        <button class="save-btn" id="save">Save Feed ✓</button>
        <button class="cancel-btn" id="cancel">Cancel</button>
      </div>`;
    sheet.innerHTML = inner;
    document.body.appendChild(sheet);
    const valEl = sheet.querySelector("#ml-val");
    sheet.querySelectorAll(".amt-btn").forEach(b => {
      b.onclick = () => {
        if(b.dataset.delta) ml = Math.max(0, Math.min(300, ml + parseInt(b.dataset.delta)));
        if(b.dataset.set !== undefined) ml = parseInt(b.dataset.set);
        valEl.textContent = ml;
      };
    });
    sheet.querySelector("#save").onclick = () => logEntry({type:"feed", feedType:"bottle", amount:ml, note:"Logged by caregiver"});
    sheet.querySelector("#cancel").onclick = closeSheet;
  } else if (type === "nappy") {
    inner = `
      <div class="sheet-inner">
        <div class="sheet-handle"></div>
        <div class="sheet-title">💩 Log a Nappy</div>
        <button class="opt-btn" data-kind="wet"><span class="emoji">💧</span>Wet</button>
        <button class="opt-btn" data-kind="dirty"><span class="emoji">💩</span>Dirty</button>
        <button class="opt-btn" data-kind="wet + dirty"><span class="emoji">💧💩</span>Wet + Dirty</button>
        <button class="cancel-btn" id="cancel">Cancel</button>
      </div>`;
    sheet.innerHTML = inner;
    document.body.appendChild(sheet);
    sheet.querySelectorAll(".opt-btn").forEach(b => {
      b.onclick = () => logEntry({type:"poop", poopType:b.dataset.kind, note:"Logged by caregiver"});
    });
    sheet.querySelector("#cancel").onclick = closeSheet;
  } else if (type === "nap-start") {
    logEntry({type:"nap", start:nowTime(), end:nowTime(), note:"Logged by caregiver"});
  } else if (type === "wake") {
    logEntry({type:"wake", note:"Logged by caregiver"});
  }
}

function _mergeCarerEntries() {
  // Merges today's pending carer_logs entries into familyContext.today so predictions reflect
  // freshly-logged events immediately (before parent has accepted them).
  try {
    if (!_childrenCache) return;
    const _todayStr = todayStrLocal();
    const _todayPending = recentEntries.filter(e => {
      const t = e.loggedAt || e.time || "";
      if (typeof t === "string" && t.length >= 10) return t.slice(0,10) === _todayStr;
      return true;
    }).map(e => ({
      type: e.type,
      time: e.time || (e.loggedAt ? e.loggedAt.slice(11,16) : nowTime()),
      amount: e.amount || 0,
      feedType: e.feedType || "",
      poopType: e.poopType || "",
      start: e.start || "",
      end: e.end || "",
      night: !!e.night
    }));
    familyContext.today = computeTodayStats(_childrenCache, childId, _todayPending) || {};
  } catch(e) { console.warn("merge carer entries failed", e); }
}

function renderApp() {
  // Listen to recent entries — real-time so carer sees their own logs reflected immediately
  const colRef = collection(db, "carer_logs", code, "entries");
  const q = query(colRef, orderBy("loggedAt", "desc"), limit(25));
  onSnapshot(q, (snap) => {
    recentEntries = [];
    snap.forEach(d => recentEntries.push({id:d.id, ...d.data()}));
    // Recompute today stats with pending entries merged, then re-render everything
    _mergeCarerEntries();
    _renderHtml();
    updateRecentList();
  });
  _renderHtml();
}

function _renderHtml() {
  const _name = familyContext.babyName;
  const _weeks = familyContext.ageWeeks;
  const _ageStr = _weeks==null ? "" : _weeks<13 ? `${_weeks}w` : _weeks<52 ? `${Math.floor(_weeks/4.3)}mo` : `${Math.floor(_weeks/52)}y`;
  const _t = familyContext.today || {};
  const _guidelineWW = _weeks!=null ? getWakeWindow(_weeks) : null;
  // Compute PERSONAL wake window from baby's actual recent patterns (overrides guideline if enough data)
  let _ww = _guidelineWW;
  let _wwIsPersonal = false;
  try {
    if (_childrenCache) {
      const _ch = childId ? (_childrenCache.find(c=>c.id===childId)||_childrenCache[0]) : _childrenCache[0];
      if (_ch && _ch.days) {
        const _dks = Object.keys(_ch.days).sort().slice(-7);
        const _gaps = [];
        _dks.forEach(dk => {
          const _de = (_ch.days[dk]||[]).filter(e=>!e.night).sort((a,b)=>{
            const [ah,am]=(a.time||a.start||"00:00").split(":").map(Number);
            const [bh,bm]=(b.time||b.start||"00:00").split(":").map(Number);
            return (ah*60+am)-(bh*60+bm);
          });
          const _wake = _de.find(e=>e.type==="wake");
          const _naps = _de.filter(e=>e.type==="nap"&&e.start&&e.end);
          if (_wake && _naps.length) {
            // Gap from wake to first nap
            const [wh,wm]=_wake.time.split(":").map(Number);
            const [nh,nm]=_naps[0].start.split(":").map(Number);
            const g1 = (nh*60+nm)-(wh*60+wm);
            if (g1 > 30 && g1 < 360) _gaps.push(g1);
          }
          // Gaps between consecutive naps
          for (let i=0; i<_naps.length-1; i++) {
            const [eh,em]=_naps[i].end.split(":").map(Number);

  // Contacts → tel: buttons
  const _contactsHtml = (familyContext.emergencyContacts||[]).filter(c=>c && c.phone && String(c.phone).trim()).map(c => `
    <a class="call-btn" href="tel:${encodeURIComponent(c.phone)}">

function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function updateRecentList() {

  if (!list) return;
  if (recentEntries.length === 0) {
    list.innerHTML = `<div style="font-size:13px;color:#A89A90;text-align:center;padding:8px">Nothing logged yet</div>`;

  }

  const labels = { feed: "Feed", poop: "Nappy", nap: "Nap", wake: "Wake" };
  list.innerHTML = recentEntries.map(e => {

    return `<div class="entry">

    </div>`;
  }).join("");
