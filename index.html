<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Baby Tracker"/>
  <meta name="theme-color" content="#faf6f0"/>
  <title>Baby Tracker</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overscroll-behavior:none;}
    body{background:#faf6f0;font-family:'DM Sans',sans-serif;}
    ::-webkit-scrollbar{display:none;}
    input,select,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = "babyTracker_v6";
const WORKER_URL = "https://babytrack.zy3sha.workers.dev";
  // check for siri shortcut actions
const params = new URLSearchParams(window.location.search);
const quickAction = params.get("action");
const SEED_DAYS = {
  "2025-04-03": [
    { id:"a1", type:"wake", time:"08:40", night:false, note:"" },
    { id:"a2", type:"feed", time:"08:45", amount:210, night:false, note:"" },
    { id:"a3", type:"nap", start:"10:40", end:"11:12", night:false, note:"" },
    { id:"a4", type:"feed", time:"11:15", amount:80, night:false, note:"" },
    { id:"a5", type:"nap", start:"13:00", end:"13:10", night:false, note:"" },
    { id:"a6", type:"feed", time:"13:15", amount:190, night:false, note:"" },
    { id:"a7", type:"nap", start:"15:50", end:"17:00", night:false, note:"" },
    { id:"a8", type:"feed", time:"17:05", amount:170, night:false, note:"" },
    { id:"a9", type:"sleep", time:"19:00", night:false, note:"" },
    { id:"a10", type:"feed", time:"20:56", amount:120, night:true, note:"" },
  ],
};

const uid = () => Math.random().toString(36).slice(2,9);
const fmt12 = t => { if(!t)return""; const[h,m]=t.split(":").map(Number); return`${h%12||12}:${String(m).padStart(2,"0")}${h>=12?"pm":"am"}`; };
const minDiff = (s,e) => { if(!s||!e)return 0; const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number); return Math.max(0,eh*60+em-sh*60-sm); };
const timeVal = e => { const t=e.time||e.start||"00:00"; const[h,m]=t.split(":").map(Number); return h*60+m; };
const fmtDate = d => { const[y,mo,day]=d.split("-"); return`${mo}/${day}/${y.slice(2)}`; };
const fmtLong = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const nowTime = () => { const n=new Date(); return`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; };
const todayStr = () => new Date().toISOString().split("T")[0];
const hm = m => m>=60?`${Math.floor(m/60)}h ${m%60}m`:m?`${m}m`:"—";
const fmtSec = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const avgArr = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

function getAwakeWindows(entries) {
  const sorted=[...entries].filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
  const wins=[]; let last=null;
  sorted.forEach(e=>{
    if(e.type==="wake") last=e.time;
    if(e.type==="nap"&&last){wins.push({from:last,to:e.start,mins:minDiff(last,e.start)});last=e.end;}
    if(e.type==="sleep"&&last){wins.push({from:last,to:e.time,mins:minDiff(last,e.time),bed:true});last=null;}
  });
  return wins;
}

const ICONS={feed:"🍼",nap:"😴",wake:"☀️",sleep:"🌙"};
const NAMES={feed:"Feed",nap:"Nap",wake:"Wake Up",sleep:"Bedtime"};
const C={ter:"#c9705a",mid:"#7a5c52",lt:"#b89890",blush:"#f2d9cc",rose:"#e8b4a0",cream:"#faf6f0",warm:"#fff9f2",mint:"#6fa898",sky:"#7aabc4",gold:"#d4a855",deep:"#2c1f1a"};

function Sheet({onClose,title,children}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(44,31,26,0.55)",backdropFilter:"blur(4px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.cream,borderRadius:"24px 24px 0 0",padding:"18px 18px 52px",width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{width:48,height:4,background:C.blush,borderRadius:99,margin:"0 auto 16px"}}/>
        {title&&<div style={{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:16}}>{title}</div>}
        {children}
      </div>
    </div>
  );
}

function Inp({label,...p}){
  return(
    <div style={{marginBottom:12}}>
      {label&&<label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{label}</label>}
      <input {...p} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",...(p.style||{})}}/>
    </div>
  );
}

function PBtn({children,onClick,v="pri",style={}}){
  const vs={pri:{background:C.ter,color:"white"},ghost:{background:C.blush,color:C.mid},danger:{background:"#e8574a",color:"white"}};
  return <button onClick={onClick} style={{width:"100%",padding:"12px",borderRadius:99,border:"none",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginTop:6,...vs[v],...style}}>{children}</button>;
}

function Badge({type,children}){
  const bg={feed:"#f5e0d8",nap:"#d4ede6",sleep:"#d5e7f2",wake:"#f5eccb"};
  const fg={feed:C.ter,nap:C.mint,sleep:C.sky,wake:"#b88a20"};
  return <span style={{display:"inline-block",padding:"3px 9px",borderRadius:99,fontSize:11,fontFamily:"monospace",background:bg[type],color:fg[type]}}>{children}</span>;
}

function TrendLine({vals,keys,color,unit=""}){
  const max=Math.max(...vals,1);
  const W=280,H=70;
  const pts=vals.map((v,i)=>({x:vals.length===1?W/2:(i/(vals.length-1))*W,y:H-(v/max)*H,v}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{overflow:"visible"}}>
      <path d={path} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={3} fill={color}/>
          {(i===pts.length-1||pts.length<=6)&&<text x={p.x} y={p.y-8} textAnchor="middle" fontSize={9} fill={C.mid} fontFamily="monospace">{p.v}{unit}</text>}
          <text x={p.x} y={H+16} textAnchor="middle" fontSize={8} fill={C.lt} fontFamily="monospace">{fmtDate(keys[i]).slice(0,5)}</text>
        </g>
      ))}
    </svg>
  );
}

function App(){
  const[days,setDays]=useState(()=>{try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch{}return SEED_DAYS;});
  const[weights,setWeights]=useState(()=>{try{return JSON.parse(localStorage.getItem("bw_v2")||"[]");}catch{return[];}});
  const[babyName,setBabyName]=useState(()=>localStorage.getItem("bn_v2")||"");
  const[selDay,setSelDay]=useState(()=>{const k=Object.keys(SEED_DAYS).sort();return k[k.length-1];});
  const[tab,setTab]=useState("day");
  const[modal,setModal]=useState(null);
  const[eType,setEType]=useState("feed");
  const[nightMode,setNightMode]=useState(false);
  const[form,setForm]=useState({amount:"",time:nowTime(),start:nowTime(),end:nowTime(),note:"",night:"no"});
  const[newDate,setNewDate]=useState(todayStr());
  const[menuDay,setMenuDay]=useState(null);
  const[editDate,setEditDate]=useState("");
  const[napOn,setNapOn]=useState(false);
  const[napStartT,setNapStartT]=useState(null);
  const[napSec,setNapSec]=useState(0);
  const[copied,setCopied]=useState(false);
  const[nameEdit,setNameEdit]=useState(false);
  const[nameIn,setNameIn]=useState("");
  const[wForm,setWForm]=useState({date:todayStr(),kg:""});
  const[analysis,setAnalysis]=useState(null);
  const[analysing,setAnalysing]=useState(false);
  const[voiceState,setVoiceState]=useState("idle");
  const[voiceTranscript,setVoiceTranscript]=useState("");
  const[voiceParsed,setVoiceParsed]=useState(null);
  const[voiceError,setVoiceError]=useState("");
  const recognitionRef=useRef(null);
  const timerRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(days));}catch{}},[days]);
  useEffect(()=>{try{localStorage.setItem("bw_v2",JSON.stringify(weights));}catch{}},[weights]);
  useEffect(()=>{try{localStorage.setItem("bn_v2",babyName);}catch{}},[babyName]);
  useEffect(()=>{
    if(napOn)timerRef.current=setInterval(()=>setNapSec(s=>s+1),1000);
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[napOn]);

  const dayKeys=Object.keys(days).sort();
  const entries=days[selDay]||[];
  const dayE=entries.filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
  const nightE=entries.filter(e=>e.night).sort((a,b)=>timeVal(a)-timeVal(b));
  const totalMl=entries.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
  const naps=dayE.filter(e=>e.type==="nap");
  const napMins=naps.reduce((s,n)=>s+minDiff(n.start,n.end),0);
  const wins=getAwakeWindows(entries);
  const last7=dayKeys.slice(-7);
  const wStats=last7.map(d=>{
    const es=days[d]||[];
    const ml=es.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
    const ns=es.filter(e=>!e.night&&e.type==="nap");
    return{date:d,ml,napM:ns.reduce((s,n)=>s+minDiff(n.start,n.end),0),naps:ns.length,nightW:es.filter(e=>e.night).length};
  });
  const avgMl=last7.length?Math.round(wStats.reduce((s,x)=>s+x.ml,0)/last7.length):0;
  const maxMl=Math.max(...wStats.map(x=>x.ml),1);
  const maxNapBar=Math.max(...wStats.map(x=>x.napM),1);
  const chunk=(arr,n)=>{const r=[];for(let i=0;i<arr.length;i+=n)r.push(arr.slice(i,i+n));return r;};
  const trendWeeks=chunk(dayKeys,7);
  const weekAvgs=trendWeeks.map(wk=>{
    const mlA=wk.map(d=>(days[d]||[]).filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0));
    const napA=wk.map(d=>{const ns=(days[d]||[]).filter(e=>e.type==="nap"&&!e.night);return ns.reduce((s,n)=>s+minDiff(n.start,n.end),0);});
    const nightA=wk.map(d=>(days[d]||[]).filter(e=>e.night).length);
    return{label:`${fmtDate(wk[0])}–${fmtDate(wk[wk.length-1])}`,days:wk.length,avgMl:avgArr(mlA),avgNap:avgArr(napA),avgNight:avgArr(nightA)};
  });
  const tLast=weekAvgs[weekAvgs.length-1];
  const tPrev=weekAvgs[weekAvgs.length-2];
  const mlVals=dayKeys.map(d=>(days[d]||[]).filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0));
  const napVals=dayKeys.map(d=>{const ns=(days[d]||[]).filter(e=>e.type==="nap"&&!e.night);return ns.reduce((s,n)=>s+minDiff(n.start,n.end),0);});

  function arrow(curr,prev){
    if(prev==null)return null;
    const d=curr-prev;
    if(Math.abs(d)<5)return{icon:"→",color:C.lt};
    return d>0?{icon:"↑",color:C.mint}:{icon:"↓",color:C.ter};
  }

  function openEntry(night=false){setNightMode(night);setEType("feed");setForm({amount:"",time:nowTime(),start:nowTime(),end:nowTime(),note:"",night:"no"});setModal("entry");}
  function delEntry(id){setDays(d=>({...d,[selDay]:(d[selDay]||[]).filter(e=>e.id!==id)}));}
  function saveEntry(){
    let e={id:uid(),note:form.note||""};
    if(eType==="feed"){if(!form.time)return;e={...e,type:"feed",time:form.time,amount:parseInt(form.amount)||0,night:nightMode||form.night==="yes"};}
    else if(eType==="nap"){if(!form.start||!form.end)return;e={...e,type:"nap",start:form.start,end:form.end,night:false};}
    else{if(!form.time)return;e={...e,type:eType,time:form.time,night:false};}
    setDays(d=>({...d,[selDay]:[...(d[selDay]||[]),e]}));
    setModal(null);
  }
  function quickFeed(ml){setDays(d=>({...d,[selDay]:[...(d[selDay]||[]),{id:uid(),type:"feed",time:nowTime(),amount:ml,night:false,note:""}]}));}
  function startNap(){setNapStartT(nowTime());setNapSec(0);setNapOn(true);}
  function endNap(){
    setNapOn(false);const end=nowTime();
    setDays(d=>({...d,[selDay]:[...(d[selDay]||[]),{id:uid(),type:"nap",start:napStartT,end,night:false,note:""}]}));
    setNapStartT(null);setNapSec(0);
  }
  function copySummary(){
    const ln=[`${fmtLong(selDay)} — ${babyName||"Baby"}'s Day`,""];
    dayE.forEach(e=>{
      if(e.type==="wake")ln.push(`☀️ Wake up ${fmt12(e.time)}`);
      else if(e.type==="feed")ln.push(`🍼 Feed ${e.amount}ml at ${fmt12(e.time)}${e.note?` (${e.note})`:""}`);
      else if(e.type==="nap")ln.push(`😴 Nap ${fmt12(e.start)}–${fmt12(e.end)} (${minDiff(e.start,e.end)}min)${e.note?` (${e.note})`:""}`);
      else if(e.type==="sleep")ln.push(`🌙 Bedtime ${fmt12(e.time)}`);
    });
    if(nightE.length){ln.push("");ln.push("Night:");nightE.forEach((e,i)=>ln.push(`🌟 Wake ${i+1} ${fmt12(e.time)}${e.amount?` — ${e.amount}ml`:""}${e.note?` (${e.note})`:""}`));}
    ln.push("");ln.push(`Total feeds: ${totalMl}ml · Naps: ${naps.length} (${hm(napMins)})`);
    navigator.clipboard.writeText(ln.join("\n")).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }
  function addDay(){if(!newDate)return;if(!days[newDate])setDays(d=>({...d,[newDate]:[]}));setSelDay(newDate);setModal(null);}
  function saveEditDay(){
    if(!editDate||editDate===menuDay){setModal(null);return;}
    if(days[editDate]){alert("A day with that date already exists.");return;}
    setDays(d=>{const c={...d};c[editDate]=c[menuDay];delete c[menuDay];return c;});
    setSelDay(editDate);setModal(null);
  }
  function delDay(){
    if(!window.confirm(`Delete all data for ${fmtDate(menuDay)}?`))return;
    setDays(d=>{const c={...d};delete c[menuDay];return c;});
    const rem=dayKeys.filter(k=>k!==menuDay);
    setSelDay(rem[rem.length-1]||null);setModal(null);
  }
  function addWeight(){
    if(!wForm.kg)return;
    const updated=[...weights.filter(x=>x.date!==wForm.date),{date:wForm.date,kg:parseFloat(wForm.kg)}].sort((a,b)=>a.date.localeCompare(b.date));
    setWeights(updated);setWForm({date:todayStr(),kg:""});
  }



  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setVoiceError("Voice input isn't supported in this browser. Try Chrome or Safari.");setVoiceState("error");setModal("voice");return;}
    const rec=new SR();
    rec.continuous=false;rec.interimResults=false;rec.lang="en-GB";
    recognitionRef.current=rec;
    rec.onresult=e=>{const t=e.results[0][0].transcript;setVoiceTranscript(t);setVoiceState("processing");parseVoice(t);};
    rec.onerror=()=>{setVoiceError("Couldn't hear you. Make sure microphone permission is allowed and try again.");setVoiceState("error");};
    rec.onend=()=>setVoiceState(s=>s==="listening"?"idle":s);
    rec.start();
    setVoiceTranscript("");setVoiceParsed(null);setVoiceError("");
    setVoiceState("listening");setModal("voice");
  }
  function stopVoice(){if(recognitionRef.current){try{recognitionRef.current.stop();}catch{}}setVoiceState("idle");}

  async function parseVoice(transcript){
    const prompt=`Parse this parent's voice note about their baby's day into JSON.
Voice: "${transcript}"
Current time: ${nowTime()}, Date: ${selDay}
Return a JSON array. Each item:
- Feed: {"type":"feed","time":"HH:MM","amount":number,"night":boolean,"note":""}
- Nap: {"type":"nap","start":"HH:MM","end":"HH:MM","note":""}
- Wake up: {"type":"wake","time":"HH:MM","note":""}
- Bedtime: {"type":"sleep","time":"HH:MM","note":""}
Rules: 24h times. "2pm"=14:00. night=true only if after 8pm or said explicitly.
Return ONLY valid JSON array, no markdown.`;
    try{
      const res=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"gpt-4o-mini",messages:[{role:"system",content:"You convert baby voice logs into structured JSON."},{role:"user",content:prompt}]})});
      const data=await res.json();
      const clean=data.choices?.[0]?.message?.content.trim().replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      if(Array.isArray(parsed)&&parsed.length>0){setVoiceParsed(parsed.map(e=>({...e,id:uid()})));setVoiceState("confirm");}
      else{setVoiceError("Couldn't understand that. Try: 'fed 180ml at 2pm' or 'nap from 1 to 1:45'.");setVoiceState("error");}
    }catch{setVoiceError("Something went wrong — make sure your Worker URL is set correctly.");setVoiceState("error");}
  }

  function confirmVoice(){
    if(!voiceParsed)return;
    setDays(d=>({...d,[selDay]:[...(d[selDay]||[]),...voiceParsed]}));
    setModal(null);setVoiceState("idle");setVoiceParsed(null);setVoiceTranscript("");
  }

  async function runAnalysis(){
    if(!selDay||!days[selDay])return;
    setAnalysis(null);setAnalysing(true);setModal("analysis");
    const es=days[selDay]||[];
    const dayEs=es.filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
    const nightEs=es.filter(e=>e.night);
    const feedEs=es.filter(e=>e.type==="feed");
    const napEs=dayEs.filter(e=>e.type==="nap");
    const wake=dayEs.find(e=>e.type==="wake");
    const sleep=dayEs.find(e=>e.type==="sleep");
    const totalMlDay=feedEs.reduce((s,f)=>s+(f.amount||0),0);
    const totalNapM=napEs.reduce((s,n)=>s+minDiff(n.start,n.end),0);
    const winsDay=getAwakeWindows(es);
    const recentKeys=Object.keys(days).sort().slice(-7);
    const recent=recentKeys.map(d=>{
      const de=days[d]||[];
      const ml=de.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
      const ns=de.filter(e=>e.type==="nap"&&!e.night);
      return fmtDate(d)+": "+ml+"ml, "+ns.length+" naps ("+ns.reduce((s,n)=>s+minDiff(n.start,n.end),0)+"min), "+de.filter(e=>e.night).length+" night wakes";
    }).join("\n");
    const prompt="You are a warm baby sleep and feeding advisor.\n\nDATE: "+fmtLong(selDay)+"\nBABY: "+(babyName||"Baby")+"\n\nTODAY:\n- Wake: "+(wake?fmt12(wake.time):"not logged")+"\n- Feeds: "+(feedEs.filter(e=>!e.night).map(f=>fmt12(f.time)+" ("+f.amount+"ml)").join(", ")||"none")+"\n- Naps: "+(napEs.map(n=>fmt12(n.start)+"–"+fmt12(n.end)+" ("+minDiff(n.start,n.end)+"min)").join(", ")||"none")+"\n- Bedtime: "+(sleep?fmt12(sleep.time):"not logged")+"\n- Night wakes: "+(nightEs.length?nightEs.map(e=>fmt12(e.time)+(e.amount?" ("+e.amount+"ml)":"")).join(", "):"none")+"\n- Total feeds: "+totalMlDay+"ml, nap time: "+hm(totalNapM)+"\n- Awake windows: "+(winsDay.map(w=>hm(w.mins)).join(", ")||"n/a")+"\n\nRECENT:\n"+recent+"\n\nPlease give:\n1. 🌟 What went well today\n2. 📊 Key observations (2-3 points)\n3. 💡 Suggestions for tomorrow with times\n4. ❤️ Encouraging note\n\nWarm, practical, concise.";
    try{
      const res = await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"gpt-4o-mini",
          messages:[
            {role:"system",content:"You are a helpful baby sleep and feeding consultant. Be warm, practical and concise."},
            {role:"user",content:prompt}
          ]
        })
      });
      const data = await res.json();
      if(data.error){setAnalysis("Error: "+(data.error.message||data.error));setAnalysing(false);return;}
      const text = data.choices?.[0]?.message?.content;
      if(text){setAnalysis(text);}else{setAnalysis("Sorry, couldn't get a response. Please try again.");}
    }catch(e){setAnalysis("Sorry, couldn't connect. Check your Worker is deployed correctly.");}
    setAnalysing(false);
  }

  const tabSt=t=>({flex:1,padding:"9px 2px",border:"none",background:"none",fontSize:11,fontWeight:600,cursor:"pointer",color:tab===t?C.ter:C.lt,borderBottom:tab===t?`2px solid ${C.ter}`:"2px solid transparent"});
  const card={background:C.warm,border:`1px solid ${C.blush}`,borderRadius:16,padding:"13px",marginBottom:13};

  return(
    <div style={{background:C.cream,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:C.deep}}>
      <style>{`
        @keyframes pulse{0%,100%{box-shadow:0 0 0 12px rgba(201,112,90,0.15)}50%{box-shadow:0 0 0 22px rgba(201,112,90,0.04)}}

                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{background:"#f5e0d8",color:C.ter,fontFamily:"monospace",fontSize:13,padding:"3px 10px",borderRadius:99,fontWeight:600}}>{w.kg} kg</span>
                    <button onClick={()=>setWeights(ws=>ws.filter(x=>x.date!==w.date))} style={{background:"#f0e5e0",border:"none",borderRadius:"50%",width:23,height:23,color:C.lt,cursor:"pointer",fontSize:10}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* FABs */}
      <div style={{position:"fixed",bottom:26,right:18,display:"flex",flexDirection:"column",gap:10,zIndex:40}}>
        <button onClick={startVoice} style={{width:50,height:50,borderRadius:"50%",background:"linear-gradient(135deg,#7a5c52,#2c1f1a)",border:"none",color:"white",fontSize:22,cursor:"pointer",boxShadow:"0 4px 16px rgba(44,31,26,0.35)",display:"flex",alignItems:"center",justifyContent:"center"}} title="Voice entry">🎤</button>
        <button onClick={()=>openEntry(false)} style={{width:54,height:54,borderRadius:"50%",background:C.ter,border:"none",color:"white",fontSize:26,cursor:"pointer",boxShadow:"0 4px 20px rgba(201,112,90,0.45)",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>

      {/* ENTRY MODAL */}
      {modal==="entry"&&(
        <Sheet onClose={()=>setModal(null)} title="Add Entry">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:15}}>
            {["feed","nap","wake","sleep"].map(t=>(
              <div key={t} onClick={()=>setEType(t)} style={{padding:"12px",borderRadius:14,border:`2px solid ${eType===t?C.ter:C.blush}`,background:eType===t?"#fdf0eb":C.warm,textAlign:"center",cursor:"pointer"}}>
                <div style={{fontSize:22}}>{ICONS[t]}</div>
                <div style={{fontSize:13,fontWeight:500,color:eType===t?C.ter:C.mid,marginTop:3}}>{NAMES[t]}</div>
              </div>
            ))}
          </div>
          {eType==="feed"&&<>
            <Inp label="Amount (ml)" type="number" inputMode="numeric" placeholder="e.g. 180" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
            <Inp label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/>
            {!nightMode&&(
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Night feed?</label>
                <select value={form.night} onChange={e=>setForm(f=>({...f,night:e.target.value}))} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}>
                  <option value="no">No — daytime</option>
                  <option value="yes">Yes — night wake</option>
                </select>
              </div>
            )}
          </>}
          {eType==="nap"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {["start","end"].map(k=>(
                <div key={k}>
                  <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{k}</label>
                  <input type="time" value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{width:"100%",padding:"9px 11px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
          )}
          {(eType==="wake"||eType==="sleep")&&<Inp label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/>}
          <Inp label="Note (optional)" type="text" placeholder="e.g. fussy, didn't finish…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
          <PBtn onClick={saveEntry}>Save Entry</PBtn>
        </Sheet>
      )}

      {modal==="addDay"&&(
        <Sheet onClose={()=>setModal(null)} title="Add New Day">
          <Inp label="Date" type="date" value={newDate} onChange={e=>setNewDate(e.target.value)}/>
          <PBtn onClick={addDay}>Add Day</PBtn>
        </Sheet>
      )}

      {modal==="dayMenu"&&menuDay&&(
        <Sheet onClose={()=>setModal(null)} title={`Edit · ${fmtDate(menuDay)}`}>
          <Inp label="Change Date To" type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}/>
          <PBtn onClick={saveEditDay}>Save New Date</PBtn>
          <PBtn v="ghost" onClick={()=>setModal(null)} style={{marginTop:8}}>Cancel</PBtn>
          <div style={{borderTop:`1px solid ${C.blush}`,margin:"12px 0"}}/>
          <PBtn v="danger" onClick={delDay}>🗑 Delete This Day</PBtn>
        </Sheet>
      )}

      {/* DAY REPORT MODAL */}
      {modal==="report"&&(()=>{
        const es=days[selDay]||[];
        const dEs=es.filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
        const nEs=es.filter(e=>e.night).sort((a,b)=>timeVal(a)-timeVal(b));
        const wakeEv=dEs.find(e=>e.type==="wake");
        const sleepEv=dEs.find(e=>e.type==="sleep");
        const dayFeeds=dEs.filter(e=>e.type==="feed");
        const dayNaps=dEs.filter(e=>e.type==="nap");
        const totalFeedMl=es.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
        const nightFeedMl=nEs.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
        const totalNapM=dayNaps.reduce((s,n)=>s+minDiff(n.start,n.end),0);
        // Night stretches: bedtime → wake1, wake1 → wake2, etc.
        const nightPoints=[];
        if(sleepEv) nightPoints.push({label:"Bedtime",time:sleepEv.time});
        nEs.forEach((e,i)=>nightPoints.push({label:`Wake ${i+1}`,time:e.time,feed:e.amount||0}));
        const stretches=[];
        for(let i=0;i<nightPoints.length-1;i++){
          const from=nightPoints[i];const to=nightPoints[i+1];
          let mins=minDiff(from.time,to.time);
          // handle cross-midnight: if negative, add 12h
          if(mins<=0) mins+=720;
          stretches.push({from:from.label,to:to.label,mins,toTime:to.time,feed:to.feed});
        }
        // Copy report text
        function copyReport(){
          const ln=[`📋 ${fmtLong(selDay)} — ${babyName||"Baby"}'s Day Report`,``];
          ln.push(`☀️ Wake up: ${wakeEv?fmt12(wakeEv.time):"—"}`);
          ln.push(`🌙 Bedtime: ${sleepEv?fmt12(sleepEv.time):"—"}`);
          ln.push(``);
          ln.push(`🍼 Total feed: ${totalFeedMl}ml`);
          ln.push(`   Daytime: ${totalFeedMl-nightFeedMl}ml over ${dayFeeds.length} feed${dayFeeds.length!==1?"s":""}`);
          if(nEs.length) ln.push(`   Night: ${nightFeedMl}ml over ${nEs.filter(e=>e.type==="feed").length} feed${nEs.filter(e=>e.type==="feed").length!==1?"s":""}`);
          ln.push(``);
          ln.push(`😴 Naps: ${dayNaps.length} nap${dayNaps.length!==1?"s":""} (${hm(totalNapM)} total)`);
          ln.push(``);
          ln.push(`🌟 Night: ${nEs.length} wake${nEs.length!==1?"s":""}`);
          if(stretches.length){
            ln.push(`   Stretches between wakes:`);
            stretches.forEach(s=>ln.push(`   ${s.from} → ${s.to} (${fmt12(s.toTime)}): ${hm(s.mins)}${s.feed?` · ${s.feed}ml`:""}`));
          }
          navigator.clipboard.writeText(ln.join("\n")).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
        }
        return(
          <Sheet onClose={()=>setModal(null)} title="">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#c9705a,#7a5c52)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📊</div>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>Day Report</div>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt}}>{fmtLong(selDay)}</div>
              </div>
            </div>

            {/* Top stats row */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Wake Up</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.gold}}>{wakeEv?fmt12(wakeEv.time):"—"}</div>
              </div>
              <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Bedtime</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.sky}}>{sleepEv?fmt12(sleepEv.time):"—"}</div>
              </div>
            </div>

            {/* Feed */}
            <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${C.ter}`,borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🍼 Feeding</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:13,color:C.deep}}>Total</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.ter}}>{totalFeedMl}<span style={{fontSize:12,color:C.lt,fontWeight:400}}>ml</span></span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.mid,borderTop:`1px solid ${C.blush}`,paddingTop:6}}>
                <span>Daytime · {dayFeeds.length} feeds</span>
                <span style={{fontFamily:"monospace"}}>{totalFeedMl-nightFeedMl}ml</span>
              </div>
              {nEs.length>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.mid,marginTop:4}}>
                <span>Night · {nEs.filter(e=>e.type==="feed").length} feeds</span>
                <span style={{fontFamily:"monospace"}}>{nightFeedMl}ml</span>
              </div>}
            </div>

            {/* Sleep */}
            <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${C.mint}`,borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>😴 Naps</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:C.deep}}>{dayNaps.length} nap{dayNaps.length!==1?"s":""}</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.mint}}>{hm(totalNapM)}</span>
              </div>
              {dayNaps.map((n,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.lt,fontFamily:"monospace",marginTop:4,borderTop:i===0?`1px solid ${C.blush}`:"none",paddingTop:i===0?6:0}}>
                  <span>{fmt12(n.start)} – {fmt12(n.end)}</span>
                  <span>{minDiff(n.start,n.end)}min</span>
                </div>
              ))}
            </div>

            {/* Night */}
            <div style={{background:"#1a1228",borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:"#6a5880",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🌟 Night Wakes</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:stretches.length?10:0}}>
                <span style={{fontSize:13,color:"#d8cce8"}}>{nEs.length} wake{nEs.length!==1?"s":""}</span>
                {nightFeedMl>0&&<span style={{background:"rgba(212,168,85,0.2)",color:C.gold,fontFamily:"monospace",fontSize:12,padding:"2px 8px",borderRadius:99}}>{nightFeedMl}ml total</span>}
              </div>
              {stretches.length>0&&(
                <>
                  <div style={{fontSize:10,fontFamily:"monospace",color:"#6a5880",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Stretches between wakes</div>
                  {stretches.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"rgba(255,255,255,0.04)",borderRadius:10,border:"1px solid #3a2e50",marginBottom:5}}>
                      <div>
                        <div style={{fontSize:12,color:"#d8cce8"}}>{s.from} → {s.to}</div>
                        <div style={{fontSize:10,fontFamily:"monospace",color:"#6a5880",marginTop:2}}>{fmt12(s.toTime)}{s.feed?` · ${s.feed}ml`:""}</div>
                      </div>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:s.mins>=180?"#6fa898":s.mins>=120?"#d4a855":"#c9705a",fontWeight:700}}>{hm(s.mins)}</span>
                    </div>
                  ))}
                </>
              )}
              {stretches.length===0&&nEs.length===0&&<div style={{fontSize:12,color:"#6a5880",fontFamily:"monospace",textAlign:"center",padding:"4px 0"}}>No night wakes logged</div>}
            </div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={copyReport} style={{flex:1,padding:"11px",borderRadius:99,border:`1px dashed ${C.rose}`,background:"none",color:C.ter,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>{copied?"✓ Copied!":"📋 Copy Report"}</button>
              <button onClick={()=>setModal(null)} style={{flex:1,padding:"11px",borderRadius:99,border:"none",background:C.blush,color:C.mid,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Done</button>
            </div>
          </Sheet>
        );
      })()}

      {/* AI ANALYSIS MODAL */}
      {modal==="analysis"&&(
        <Sheet onClose={()=>{if(!analysing)setModal(null);}} title="">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#c9705a,#7a5c52)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>✨</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>AI Analysis</div>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt}}>{fmtLong(selDay)}</div>
            </div>
          </div>
          {analysing&&!analysis&&(
            <div style={{textAlign:"center",padding:"32px 0"}}>
              <div style={{fontSize:28,marginBottom:12,animation:"spin 1.5s linear infinite",display:"inline-block"}}>🔮</div>
              <div style={{fontSize:14,color:C.mid,fontFamily:"monospace"}}>Analysing {babyName||"baby"}'s day…</div>
            </div>
          )}
          {analysis&&(
            <div style={{fontSize:14,lineHeight:1.7,color:C.deep,whiteSpace:"pre-wrap"}}>
              {analysis}
              {analysing&&<span style={{display:"inline-block",width:8,height:16,background:C.ter,marginLeft:4,animation:"blink 1s step-end infinite",verticalAlign:"text-bottom"}}/>}
            </div>
          )}
          {!analysing&&analysis&&(
            <div style={{marginTop:20,display:"flex",gap:8}}>
              <button onClick={runAnalysis} style={{flex:1,padding:"10px",borderRadius:99,border:`1px solid ${C.rose}`,background:"none",color:C.ter,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>🔄 Regenerate</button>
              <button onClick={()=>setModal(null)} style={{flex:1,padding:"10px",borderRadius:99,border:"none",background:C.blush,color:C.mid,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Done</button>
            </div>
          )}
        </Sheet>
      )}

      {/* VOICE MODAL */}
      {modal==="voice"&&(
        <Sheet onClose={()=>{stopVoice();setModal(null);}} title="">
          <div style={{textAlign:"center",padding:"8px 0 20px"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:4}}>Voice Entry</div>
            <div style={{fontSize:12,fontFamily:"monospace",color:C.lt,marginBottom:24}}>Speak naturally — I'll figure out the rest</div>
            {voiceState==="listening"&&(
              <div>
                <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#7a5c52,#c9705a)",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,animation:"pulse 1.5s ease-in-out infinite"}}>🎤</div>
                <div style={{fontSize:14,color:C.mid,marginBottom:6}}>Listening…</div>
                <div style={{fontSize:12,fontFamily:"monospace",color:C.lt,marginBottom:20}}>Try: "fed 180ml at 2pm" or "nap 1 to 1:45"</div>
                <button onClick={stopVoice} style={{background:C.blush,border:"none",borderRadius:99,padding:"10px 24px",fontSize:13,color:C.mid,cursor:"pointer",fontWeight:600}}>Cancel</button>
              </div>
            )}
            {voiceState==="processing"&&(
              <div>
                <div style={{fontSize:28,marginBottom:12,animation:"spin 1.5s linear infinite",display:"inline-block"}}>🔮</div>
                <div style={{fontSize:13,color:C.mid,marginBottom:8}}>Heard:</div>
                <div style={{background:C.blush,borderRadius:12,padding:"10px 14px",fontSize:14,color:C.deep,fontStyle:"italic",marginBottom:16}}>"{voiceTranscript}"</div>
                <div style={{fontSize:13,color:C.lt,fontFamily:"monospace"}}>Parsing entries…</div>
              </div>
            )}
            {voiceState==="confirm"&&voiceParsed&&(
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:13,color:C.mid,marginBottom:12,textAlign:"center",fontFamily:"monospace"}}>Found {voiceParsed.length} entr{voiceParsed.length===1?"y":"ies"} — does this look right?</div>
                <div style={{background:C.blush,borderRadius:12,padding:"10px 14px",fontSize:13,color:C.deep,fontStyle:"italic",marginBottom:14,textAlign:"center"}}>"{voiceTranscript}"</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                  {voiceParsed.map((e,i)=>{
                    const fg={feed:C.ter,nap:C.mint,sleep:C.sky,wake:"#b88a20"};
                    return(
                      <div key={i} style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${fg[e.type]||C.ter}`,borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:18}}>{ICONS[e.type]||"📝"}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:C.deep}}>{NAMES[e.type]||e.type}</div>
                          <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginTop:2}}>
                            {e.type==="feed"&&<span>{fmt12(e.time)} · {e.amount}ml{e.night?" · night":""}</span>}
                            {e.type==="nap"&&<span>{fmt12(e.start)} – {fmt12(e.end)} · {minDiff(e.start,e.end)} min</span>}
                            {(e.type==="wake"||e.type==="sleep")&&<span>{fmt12(e.time)}</span>}
                          </div>
                        </div>
                        <button onClick={()=>setVoiceParsed(p=>p.filter((_,j)=>j!==i))} style={{background:"#f0e5e0",border:"none",borderRadius:"50%",width:22,height:22,color:C.lt,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={startVoice} style={{flex:1,padding:"11px",borderRadius:99,border:`1px solid ${C.rose}`,background:"none",color:C.ter,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>🎤 Redo</button>
                  <button onClick={confirmVoice} style={{flex:1,padding:"11px",borderRadius:99,border:"none",background:C.ter,color:"white",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>✓ Add All</button>
                </div>
              </div>
            )}
            {voiceState==="error"&&(
              <div>
                <div style={{fontSize:28,marginBottom:12}}>😕</div>
                <div style={{fontSize:13,color:C.mid,marginBottom:16,padding:"0 8px"}}>{voiceError}</div>
                <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                  <button onClick={startVoice} style={{padding:"10px 20px",borderRadius:99,border:"none",background:C.ter,color:"white",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>🎤 Try Again</button>
                  <button onClick={()=>setModal(null)} style={{padding:"10px 20px",borderRadius:99,border:`1px solid ${C.blush}`,background:"none",color:C.mid,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
                </div>
              </div>
            )}
            {voiceState==="idle"&&(
              <div>
                <button onClick={startVoice} style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#7a5c52,#c9705a)",border:"none",color:"white",fontSize:32,cursor:"pointer",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(201,112,90,0.3)"}}>🎤</button>
                <div style={{fontSize:13,color:C.mid,marginBottom:4}}>Tap to start speaking</div>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt}}>e.g. "fed 180ml at 2, nap 3 to 4:30, bedtime 7"</div>
              </div>
            )}
          </div>
        </Sheet>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
