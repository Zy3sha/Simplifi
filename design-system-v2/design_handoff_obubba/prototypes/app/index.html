<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OBubba — Main app UI kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Parisienne&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ob-font-body:'DM Sans',system-ui,sans-serif;
    --ob-font-display:'Playfair Display',Georgia,serif;
    --ob-font-brand:'Parisienne',cursive;
    --ob-text-deep:#5B4F4F;--ob-text-mid:#7A6B6B;--ob-text-lt:#A89898;
  }
  html,body{margin:0;min-height:100vh;font-family:var(--ob-font-body);color:var(--ob-text-deep);
    background:
      radial-gradient(ellipse 65% 55% at 15% 10%,rgba(245,218,210,0.35),transparent 70%),
      radial-gradient(ellipse 50% 45% at 80% 15%,rgba(240,210,200,0.28),transparent 65%),
      radial-gradient(ellipse 70% 50% at 55% 45%,rgba(255,248,242,0.45),transparent 60%),
      linear-gradient(135deg,#FFF8F2 0%,#F5E1D8 40%,#F0DDD6 100%);
    background-attachment: fixed;
  }
  .stage{max-width:1100px;margin:0 auto;padding:28px 20px 60px}
  .meta{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .brand{font:400 48px/1 'Parisienne',cursive;color:var(--ob-text-deep)}
  .sub{font:600 12px/1 'DM Sans',sans-serif;color:var(--ob-text-lt);text-transform:uppercase;letter-spacing:0.15em}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
  .ctrl{padding:10px 16px;border-radius:99px;border:1.5px solid rgba(255,225,235,0.55);background:rgba(255,255,255,0.55);
    font:700 13px/1 'DM Sans',sans-serif;color:var(--ob-text-deep);cursor:pointer;
    box-shadow:-4px -4px 5px -4px rgba(217,168,192,0.40),4px 4px 5px -4px rgba(192,160,220,0.30)}
  .ctrl.active{background:linear-gradient(135deg,#C07088,#A85A44);color:#fff;border-color:transparent}
  .grid{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
  .frame-label{text-align:center;font:600 11px/1 'DM Sans',sans-serif;color:var(--ob-text-lt);text-transform:uppercase;letter-spacing:0.12em;margin-top:10px}
  .frame-wrap{display:flex;flex-direction:column;align-items:center}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div class="stage">
  <div class="meta">
    <div class="brand">OBubba</div>
    <div class="sub">· Main app UI kit</div>
  </div>
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">

// ───── PhoneFrame.jsx ─────
// Mobile frame that wraps an OBubba app screen.
// 390×844 iPhone-ish proportions, with the watercolour body background baked in.
function PhoneFrame({ children, dark = false }) {
  const bg = dark
    ? {
        background:
          "radial-gradient(ellipse 65% 55% at 20% 20%,rgba(255,160,60,0.09),transparent 65%)," +
          "radial-gradient(ellipse 50% 45% at 75% 60%,rgba(255,140,40,0.06),transparent 60%)," +
          "linear-gradient(170deg,#080e1c 0%,#0c1628 30%,#101d35 55%,#0c1628 100%)",
      }
    : {
        background:
          "radial-gradient(ellipse 65% 55% at 15% 10%,rgba(245,218,210,0.35),transparent 70%)," +
          "radial-gradient(ellipse 50% 45% at 80% 15%,rgba(240,210,200,0.28),transparent 65%)," +
          "radial-gradient(ellipse 70% 50% at 55% 45%,rgba(255,248,242,0.45),transparent 60%)," +
          "radial-gradient(ellipse 55% 60% at 25% 70%,rgba(238,215,208,0.25),transparent 65%)," +
          "radial-gradient(ellipse 60% 45% at 75% 65%,rgba(240,208,200,0.28),transparent 60%)," +
          "linear-gradient(135deg,#FFF8F2 0%,#F5E1D8 40%,#F0DDD6 100%)",
      };
  return (
    <div
      style={{
        width: 390,
        height: 844,
        borderRadius: 44,
        overflow: "hidden",
        position: "relative",
        fontFamily: "'DM Sans',system-ui,sans-serif",
        color: dark ? "#F0F2F5" : "#5B4F4F",
        boxShadow:
          "0 24px 60px rgba(60,40,30,0.22), 0 8px 24px rgba(60,40,30,0.12), inset 0 0 0 8px #1a1a1a, inset 0 0 0 9px rgba(255,255,255,0.08)",
        ...bg,
      }}
    >
      {/* Dynamic island */}
      <div
        style={{
          position: "absolute",
          top: 10,
          left: "50%",
          transform: "translateX(-50%)",
          width: 110,
          height: 32,
          borderRadius: 20,
          background: "#000",
          zIndex: 100,
        }}
      />
      {/* Status bar */}
      <div
        style={{
          position: "absolute",
          top: 14,
          left: 0,
          right: 0,
          display: "flex",
          justifyContent: "space-between",
          padding: "0 28px",
          fontSize: 15,
          fontWeight: 600,
          color: dark ? "#F0F2F5" : "#5B4F4F",
          zIndex: 101,
        }}
      >
        <span>9:41</span>
        <span style={{ letterSpacing: "2px" }}>●●●● 􀙇 􀛨</span>
      </div>
      <div style={{ position: "absolute", inset: 0, paddingTop: 54 }}>{children}</div>
    </div>
  );
}




// ───── AppHeader.jsx ─────
// App header — "OBUBBA" wordmark + baby name chip + theme toggle.
function AppHeader({ babyName = "Oliver", dark = false, onToggleTheme }) {
  return (
    <div
      style={{
        position: "relative",
        padding: "14px 18px 12px",
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        borderBottom: `1px solid ${dark ? "rgba(255,190,90,0.16)" : "rgba(255,255,255,0.5)"}`,
        background: dark ? "rgba(8,14,28,0.30)" : "rgba(255,252,250,0.30)",
        backdropFilter: "blur(16px) saturate(1.5)",
        WebkitBackdropFilter: "blur(16px) saturate(1.5)",
        boxShadow: dark
          ? "0 4px 20px rgba(0,0,0,0.30)"
          : "0 4px 20px rgba(246,221,227,0.25)",
        zIndex: 10,
      }}
    >
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 10,
          padding: "5px 12px 5px 5px",
          borderRadius: 99,
          background: dark ? "rgba(24,38,62,0.6)" : "rgba(255,255,255,0.5)",
          border: `1px solid ${dark ? "rgba(255,190,90,0.25)" : "rgba(255,225,235,0.6)"}`,
        }}
      >
        <img
          src="../../assets/icon-192.png"
          alt=""
          style={{ width: 26, height: 26, borderRadius: 99 }}
        />
        <span
          style={{
            fontFamily: "'Playfair Display',serif",
            fontWeight: 700,
            fontSize: 14,
            color: dark ? "#F0F2F5" : "#5B4F4F",
          }}
        >
          {babyName}
        </span>
        <span style={{ fontSize: 10, color: dark ? "#B0BEC9" : "#A89898" }}>6 mo</span>
      </div>
      <div
        style={{
          fontFamily: "'Parisienne',cursive",
          fontWeight: 400,
          fontSize: 30,
          letterSpacing: "0",
          color: dark ? "#F0F2F5" : "#5B4F4F",
          lineHeight: 1,
        }}
      >
        OBubba
      </div>
      <button
        onClick={onToggleTheme}
        style={{
          width: 36,
          height: 36,
          borderRadius: 99,
          border: `1.5px solid ${dark ? "rgba(255,190,90,0.35)" : "rgba(255,225,235,0.6)"}`,
          background: dark ? "rgba(24,38,62,0.6)" : "rgba(255,255,255,0.55)",
          fontSize: 16,
          cursor: "pointer",
          boxShadow: dark
            ? "-4px -4px 5px -4px rgba(255,170,60,0.35),4px 4px 5px -4px rgba(255,150,40,0.25)"
            : "-4px -4px 5px -4px rgba(217,168,192,0.40),4px 4px 5px -4px rgba(192,160,220,0.30)",
        }}
        aria-label="Toggle theme"
      >
        {dark ? "☀️" : "🌙"}
      </button>
    </div>
  );
}




// ───── BottomNav.jsx ─────
// Fixed bottom tab bar — Today / Insights / Growth / Account.
function BottomNav({ tab, onChange, dark = false }) {
  const tabs = [
    { id: "today", icon: "🏠", label: "Today" },
    { id: "insights", icon: "📊", label: "Insights" },
    { id: "growth", icon: "🌱", label: "Growth" },
    { id: "account", icon: "👤", label: "Account" },
  ];
  return (
    <div
      style={{
        position: "absolute",
        left: 0,
        right: 0,
        bottom: 0,
        padding: "10px 14px 28px",
        display: "flex",
        justifyContent: "space-around",
        alignItems: "center",
        background: dark ? "rgba(8,14,28,0.72)" : "rgba(255,252,248,0.88)",
        backdropFilter: "blur(20px) saturate(1.5)",
        WebkitBackdropFilter: "blur(20px) saturate(1.5)",
        borderTop: `1px solid ${dark ? "rgba(255,190,90,0.16)" : "rgba(255,255,255,0.48)"}`,
        boxShadow: dark
          ? "0 -2px 20px rgba(0,0,0,0.35)"
          : "0 -4px 24px rgba(245,218,210,0.18)",
      }}
    >
      {tabs.map((t) => {
        const active = t.id === tab;
        return (
          <button
            key={t.id}
            onClick={() => onChange && onChange(t.id)}
            style={{
              flex: 1,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 2,
              padding: "4px 0",
              background: "none",
              border: "none",
              cursor: "pointer",
              opacity: active ? 1 : 0.55,
              color: dark ? "#F0F2F5" : "#5B4F4F",
            }}
          >
            <span style={{ fontSize: 22, filter: active ? "none" : "grayscale(0.3)" }}>{t.icon}</span>
            <span style={{ fontSize: 10, fontWeight: active ? 700 : 600 }}>{t.label}</span>
            {active && (
              <span
                style={{
                  width: 4,
                  height: 4,
                  borderRadius: 99,
                  background: "#C07088",
                  marginTop: 1,
                }}
              />
            )}
          </button>
        );
      })}
    </div>
  );
}




// ───── GlassCard.jsx ─────
// Glass card surface — the signature OBubba container.
function GlassCard({ children, dark = false, hero = false, style, padding = "16px 18px" }) {
  const base = dark
    ? {
        background: "rgba(18,30,52,0.50)",
        border: "1.5px solid rgba(255,190,90,0.25)",
        boxShadow:
          "0 0 20px rgba(255,180,70,0.16),inset 0 1.5px 0 rgba(255,200,120,0.20),0 6px 18px rgba(0,0,0,0.32)",
      }
    : {
        background: "rgba(255,255,255,0.45)",
        border: "1.5px solid rgba(255,255,255,0.55)",
        boxShadow:
          "0 0 24px rgba(255,255,255,0.65),0 0 48px rgba(245,218,210,0.32),0 8px 24px rgba(200,150,130,0.12),inset 0 1.5px 0 rgba(255,255,255,0.85)",
      };
  const heroBg = hero
    ? dark
      ? "radial-gradient(ellipse 140% 90% at 50% 0%,rgba(255,180,70,0.18),transparent 55%),radial-gradient(ellipse 80% 60% at 100% 100%,rgba(255,200,120,0.12),transparent 60%),rgba(18,30,52,0.50)"
      : "radial-gradient(ellipse 140% 90% at 50% 0%,rgba(245,218,210,0.55),transparent 55%),radial-gradient(ellipse 80% 60% at 100% 100%,rgba(246,221,227,0.40),transparent 60%),rgba(255,255,255,0.45)"
    : base.background;
  return (
    <div
      style={{
        position: "relative",
        borderRadius: hero ? 24 : 22,
        padding,
        overflow: "hidden",
        isolation: "isolate",
        backdropFilter: "blur(20px) saturate(1.6)",
        WebkitBackdropFilter: "blur(20px) saturate(1.6)",
        ...base,
        background: heroBg,
        ...style,
      }}
    >
      <div
        style={{
          position: "absolute",
          top: 0,
          left: 0,
          right: 0,
          height: "48%",
          pointerEvents: "none",
          background: dark
            ? "linear-gradient(180deg,rgba(255,200,120,0.10) 0%,transparent 100%)"
            : "linear-gradient(180deg,rgba(255,255,255,0.22) 0%,rgba(255,255,255,0.05) 40%,transparent 100%)",
          borderRadius: "22px 22px 0 0",
          mixBlendMode: "overlay",
        }}
      />
      <div style={{ position: "relative", zIndex: 2 }}>{children}</div>
    </div>
  );
}




// ───── HeroCard.jsx ─────
// Hero card — big headline number with Playfair numerals + context line.
function HeroCard({ dark = false, babyName = "Oliver", lastFeed = "2h 14m ago", nextNap = "in ~18 min", status = "awake" }) {
  const statusCopy = {
    awake: { emoji: "👶", label: "awake", sub: "wake window 1.5–2h" },
    sleeping: { emoji: "😴", label: "sleeping", sub: "nap in progress" },
    feeding: { emoji: "🍼", label: "feeding", sub: "bottle · right side" },
  }[status];
  return (
    <GlassCard dark={dark} hero padding="22px 20px">
      <div
        style={{
          fontSize: 11,
          fontWeight: 600,
          letterSpacing: "0.12em",
          textTransform: "uppercase",
          color: dark ? "#B0BEC9" : "#A89A90",
          marginBottom: 8,
        }}
      >
        RIGHT NOW
      </div>
      <div
        style={{
          fontFamily: "'Playfair Display',serif",
          fontWeight: 700,
          fontSize: 32,
          lineHeight: 1.1,
          color: dark ? "#F0F2F5" : "#4A3B35",
          marginBottom: 4,
        }}
      >
        {babyName} is {statusCopy.label}.
      </div>
      <div
        style={{
          fontSize: 14,
          color: dark ? "#B0BEC9" : "#7A6B6B",
          marginBottom: 16,
          fontStyle: "italic",
        }}
      >
        {statusCopy.sub}
      </div>
      <div style={{ display: "flex", gap: 14 }}>
        <div style={{ flex: 1 }}>
          <div
            style={{
              fontSize: 10,
              fontWeight: 700,
              letterSpacing: "0.1em",
              textTransform: "uppercase",
              color: dark ? "#B0BEC9" : "#A89A90",
              marginBottom: 2,
            }}
          >
            Last feed
          </div>
          <div
            style={{
              fontFamily: "'Playfair Display',serif",
              fontWeight: 700,
              fontSize: 22,
              color: "#C07088",
              lineHeight: 1,
            }}
          >
            {lastFeed}
          </div>
        </div>
        <div style={{ width: 1, background: dark ? "rgba(255,190,90,0.25)" : "rgba(192,112,136,0.2)" }} />
        <div style={{ flex: 1 }}>
          <div
            style={{
              fontSize: 10,
              fontWeight: 700,
              letterSpacing: "0.1em",
              textTransform: "uppercase",
              color: dark ? "#B0BEC9" : "#A89A90",
              marginBottom: 2,
            }}
          >
            Next nap
          </div>
          <div
            style={{
              fontFamily: "'Playfair Display',serif",
              fontWeight: 700,
              fontSize: 22,
              color: dark ? "#e0b86a" : "#6FA898",
              lineHeight: 1,
            }}
          >
            {nextNap}
          </div>
        </div>
      </div>
    </GlassCard>
  );
}




// ───── QuickActions.jsx ─────
// 4-up action grid — big emoji tiles.
function QuickActions({ dark = false, onAction }) {
  const actions = [
    { id: "feed", icon: "🍼", label: "Feed" },
    { id: "sleep", icon: "😴", label: "Sleep" },
    { id: "nappy", icon: "💩", label: "Nappy" },
    { id: "note", icon: "📋", label: "Note" },
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
      {actions.map((a) => (
        <button
          key={a.id}
          onClick={() => onAction && onAction(a.id)}
          style={{
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            gap: 6,
            padding: "14px 6px",
            borderRadius: 14,
            minHeight: 76,
            border: dark ? "1.5px solid rgba(255,190,90,0.25)" : "1.5px solid rgba(255,225,235,0.55)",
            background: dark ? "rgba(18,30,52,0.55)" : "rgba(255,255,255,0.55)",
            boxShadow: dark
              ? "-5px -5px 6px -5px rgba(255,170,60,0.40),5px 5px 6px -5px rgba(255,150,40,0.30)"
              : "-5px -5px 6px -5px rgba(217,168,192,0.45),5px 5px 6px -5px rgba(192,160,220,0.35)",
            cursor: "pointer",
            color: dark ? "#F0F2F5" : "#5B4F4F",
          }}
        >
          <span style={{ fontSize: 24 }}>{a.icon}</span>
          <span style={{ fontSize: 11, fontWeight: 700 }}>{a.label}</span>
        </button>
      ))}
    </div>
  );
}




// ───── TimelineList.jsx ─────
// Timeline log list — rows of activity with emoji icons.
function TimelineList({ entries, dark = false }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      {entries.map((e, i) => (
        <div
          key={i}
          data-entry-id={i}
          style={{
            position: "relative",
            display: "flex",
            alignItems: "center",
            gap: 10,
            padding: "11px 12px",
            borderRadius: 14,
            background: dark ? "rgba(18,30,52,0.55)" : "rgba(255,255,255,0.50)",
            border: dark ? "1.5px solid rgba(255,190,90,0.22)" : "1.5px solid rgba(255,225,235,0.4)",
            boxShadow: dark
              ? "-4px -4px 6px -5px rgba(255,170,60,0.35),4px 4px 6px -5px rgba(255,150,40,0.25)"
              : "-4px -4px 6px -5px rgba(217,168,192,0.42),4px 4px 6px -5px rgba(192,160,220,0.32)",
            color: dark ? "#F0F2F5" : "#4A3B35",
            overflow: "hidden",
          }}
        >
          <span style={{ fontSize: 20, flexShrink: 0 }}>{e.icon}</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>{e.title}</div>
            {e.sub && (
              <div style={{ fontSize: 11, color: dark ? "#B0BEC9" : "#7A6B6B", marginTop: 1 }}>{e.sub}</div>
            )}
          </div>
          <div
            style={{
              fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace",
              fontSize: 11,
              color: dark ? "#e0b86a" : "#7A5C52",
              flexShrink: 0,
            }}
          >
            {e.time}
          </div>
        </div>
      ))}
    </div>
  );
}




// ───── LogSheet.jsx ─────
// Bottom sheet that slides up — used for all logging forms.
function LogSheet({ type = "feed", onClose, onSave, dark = false }) {
  const [amount, setAmount] = React.useState(120);
  const [side, setSide] = React.useState("right");
  const copy = {
    feed: { title: "Log a feed", emoji: "🍼", sub: "Bottle · right now" },
    sleep: { title: "Starting a sleep", emoji: "😴", sub: "I'll stop the timer when baby wakes." },
    nappy: { title: "Nappy change", emoji: "💩", sub: "Quick tap, done." },
    note: { title: "Add a note", emoji: "📋", sub: "For anyone caring for baby today." },
  }[type];

  return (
    <div
      onClick={onClose}
      style={{
        position: "absolute",
        inset: 0,
        background: dark ? "rgba(0,0,0,0.60)" : "rgba(91,79,79,0.35)",
        zIndex: 50,
        display: "flex",
        alignItems: "flex-end",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%",
          borderRadius: "28px 28px 0 0",
          padding: "14px 22px 32px",
          background: dark ? "rgba(14,22,42,0.94)" : "rgba(255,252,250,0.95)",
          backdropFilter: "blur(30px) saturate(1.6)",
          WebkitBackdropFilter: "blur(30px) saturate(1.6)",
          boxShadow: dark
            ? "0 -8px 40px rgba(0,0,0,0.40),inset 0 1px 0 rgba(255,200,120,0.16)"
            : "0 -8px 40px rgba(246,221,227,0.25),inset 0 1px 0 rgba(255,255,255,0.70)",
          color: dark ? "#F0F2F5" : "#5B4F4F",
          animation: "slideUp 0.3s cubic-bezier(0.22,1,0.36,1)",
        }}
      >
        <div
          style={{
            width: 40,
            height: 4,
            borderRadius: 99,
            background: dark ? "rgba(255,190,90,0.3)" : "rgba(91,79,79,0.25)",
            margin: "0 auto 14px",
          }}
        />
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
          <span style={{ fontSize: 28 }}>{copy.emoji}</span>
          <div>
            <div style={{ fontFamily: "'Playfair Display',serif", fontWeight: 700, fontSize: 22 }}>
              {copy.title}
            </div>
            <div style={{ fontSize: 12, color: dark ? "#B0BEC9" : "#7A6B6B", fontStyle: "italic" }}>
              {copy.sub}
            </div>
          </div>
        </div>

        {type === "feed" && (
          <>
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: dark ? "#B0BEC9" : "#A89898", marginBottom: 6 }}>AMOUNT</div>

function Root(){
  const [tab,setTab] = React.useState("today");
  const [dark,setDark] = React.useState(false);
  const [sheet,setSheet] = React.useState(null);
  const screen = {
    today: <TodayScreen dark={dark} onLog={setSheet}/>,
    insights: <InsightsScreen dark={dark}/>,
    growth: <GrowthScreen dark={dark}/>,
    account: <AccountScreen dark={dark}/>,
  }[tab];
  const tabs = ["today","insights","growth","account"];
  return (
    <>
      <div className="controls">
        {tabs.map(t => (
          <button key={t} className={"ctrl"+(t===tab?" active":"")} onClick={()=>setTab(t)}>
            {t[0].toUpperCase()+t.slice(1)}
          </button>
        ))}
        <button className="ctrl" onClick={()=>setDark(!dark)}>{dark?"☀️ Day":"🌙 Night"}</button>
      </div>
      <div className="grid">
        <div className="frame-wrap">
          <PhoneFrame dark={dark}>
            <AppHeader dark={dark} onToggleTheme={()=>setDark(!dark)}/>
            {screen}
            {sheet && <LogSheet type={sheet} dark={dark} onClose={()=>setSheet(null)} onSave={()=>setSheet(null)}/>}
            <BottomNav tab={tab} onChange={setTab} dark={dark}/>
          </PhoneFrame>
          <div className="frame-label">Live · {tab} · {dark?"night":"day"}</div>
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
