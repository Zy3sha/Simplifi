name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Babel
        run: npm install --save-dev @babel/cli @babel/core @babel/preset-react

      - name: Compile JSX → JS
        run: npx babel app.jsx --presets=@babel/preset-react -o app.js

      - name: Commit compiled file
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app.js
          git diff --staged --quiet || git commit -m "Auto-compile app.jsx → app.js"
          git push
